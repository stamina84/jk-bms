# Journal retention for the jk-bms collectors.
#
# install.sh places this at /etc/systemd/journald.conf.d/10-jk-bms.conf.
# NOTE: journald storage is system-wide, so these bounds apply to the whole
# journal, not just our services. They are sized to keep well over 24h of logs
# while capping disk usage. Tune to taste; remove the file to revert to defaults.
[Journal]
# Keep logs across reboots.
Storage=persistent
# Hard cap on total journal size on disk.
SystemMaxUse=200M
# Drop entries older than this regardless of size.
MaxRetentionSec=30day
